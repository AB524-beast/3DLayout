services:
  - type: web
    name: 3d-layout-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: "https://3-d-layout-37k8-dc3pluorm-ab524-beasts-projects.vercel.app,https://3-d-layout-37k8-dc3pluorm-ab524-beasts-projects.vercel.app"
